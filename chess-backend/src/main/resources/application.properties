spring.application.name=chess-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/chessy
spring.datasource.username=chessy
spring.datasource.password=chessy_secret
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=your-super-secret-key-replace-this-value-min-32-chars
jwt.expiration=900000