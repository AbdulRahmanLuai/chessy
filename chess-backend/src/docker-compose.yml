version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chessy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chessy
      POSTGRES_PASSWORD: chessy_secret
      POSTGRES_DB: chessy
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: